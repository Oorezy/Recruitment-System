<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Job - Recruitment System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>Recruitment System</h1>
    </div>

    <nav class="topbar-right">
      <a href="jobs.html" class="nav-link">Jobs</a>
      <a href="applicant-dashboard.html" class="nav-link">Dashboard</a>
      <a href="#" class="nav-link" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="page-header">
      <div>
        <h2 id="applyPageTitle">Apply for Job</h2>
        <p>Submit your application for this role.</p>
      </div>
    </section>

    <section class="form-card">
      <div id="applyJobSummary" class="job-summary-box">
        <p>Loading job information...</p>
      </div>

      <form id="applyForm" style="margin-top: 24px;">
        <div class="form-group">
          <label for="coverLetter">Cover Letter / Short Note</label>
          <textarea
            id="coverLetter"
            rows="6"
            placeholder="Write a short note about why you are a good fit for this role"
          ></textarea>
        </div>

          <div class="form-group">
          <label for="skills">Skills</label>
          <input type="text" id="skills" placeholder="e.g. JavaScript, HTML, CSS" />
        </div>

        <div class="form-group">
          <label for="resumeFile">Upload Resume</label>
          <input type="file" id="resumeFile" accept=".pdf" required/>
          <small class="small-muted">Accepted formats: PDF</small>
        </div>

        <div class="action-row">
          <button type="submit" class="btn-primary btn-inline">Submit Application</button>
          <a href="jobs.html" class="btn-secondary btn-inline text-no-underline">Cancel</a>
        </div>

        <p id="applyMessage" class="message"></p>
      </form>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/apply.js"></script>
</body>
</html>
