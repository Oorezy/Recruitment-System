<!DOCTYPE html>
<html lang="en">
<head>
  <title>Create Job - Recruitment System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>Recruitment System</h1>
    </div>

    <nav class="topbar-right">
      <a href="recruiter-dashboard.html" class="nav-link">Dashboard</a>
      <a href="recruiter-jobs.html" class="nav-link">Manage Jobs</a>
      <a href="#" class="nav-link" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="page-header">
      <div>
        <h2>Create Job</h2>
        <p>Add a new job opening for applicants.</p>
      </div>
    </section>

    <section class="form-card">
      <form id="createJobForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="title">Job Title</label>
            <input type="text" id="title" required />
          </div>

          <div class="form-group">
            <label for="department">Department</label>
            <input type="text" id="department" required />
          </div>

          <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" required />
          </div>

          <div class="form-group">
            <label for="jobType">Job Type</label>
            <select id="jobType" required>
              <option value="">Select job type</option>
              <option value="Full-time">Full-time</option>
              <option value="Part-time">Part-time</option>
              <option value="Contract">Contract</option>
              <option value="Hybrid">Hybrid</option>
              <option value="Remote">Remote</option>
            </select>
          </div>

          <div class="form-group">
            <label for="deadline">Application Deadline</label>
            <input type="date" id="deadline" required />
          </div>

          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" required>
              <option value="Open">Open</option>
              <option value="Closed">Closed</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="5" required></textarea>
        </div>

        <div class="form-group">
          <label for="skills">Required Skills</label>
          <input type="text" id="skills" placeholder="e.g. JavaScript, HTML, CSS" />
        </div>

        <div class="form-group">
          <label for="responsibilities">Responsibilities</label>
          <textarea id="responsibilities" rows="4" placeholder="One per line"></textarea>
        </div>

        <div class="form-group">
          <label for="qualifications">Qualifications</label>
          <textarea id="qualifications" rows="4" placeholder="One per line"></textarea>
        </div>

        <div class="action-row">
          <button type="submit" class="btn-primary btn-inline">Create Job</button>
          <a href="recruiter-jobs.html" class="btn-secondary btn-inline text-no-underline">Cancel</a>
        </div>

        <p id="createJobMessage" class="message"></p>
      </form>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/create-job.js"></script>
</body>
</html>
