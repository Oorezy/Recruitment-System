<!DOCTYPE html>
<head>
  <title>Jobs - Recruitment System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>Recruitment System</h1>
    </div>

    <nav class="topbar-right">
      <a href="jobs.html" class="nav-link active">Jobs</a>
      <a href="applicant-dashboard.html" class="nav-link">Dashboard</a>
      <a href="#" class="nav-link" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="page-header">
      <div>
        <h2>Available Jobs</h2>
        <p>Browse open roles and view requirements.</p>
      </div>
    </section>

    <section class="filter-bar">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by job title"
      />
      <button class="btn-secondary" id="searchBtn">Search</button>
    </section>

    <section id="jobsContainer" class="jobs-grid">
      <p>Jobs from API</p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/jobs.js"></script>
</body>
</html>
