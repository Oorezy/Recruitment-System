<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Applications - Recruitment System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>Recruitment System</h1>
    </div>

    <nav class="topbar-right">
      <a href="recruiter-dashboard.html" class="nav-link">Dashboard</a>
      <a href="recruiter-jobs.html" class="nav-link active">Manage Jobs</a>
      <a href="#" class="nav-link" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="page-header">
      <div>
        <h2 id="jobApplicationsTitle">Job Applications</h2>
        <p>Review applicants and update their status.</p>
      </div>
    </section>

    <section class="filter-bar">
      <input
        type="text"
        id="applicationSearchInput"
        placeholder="Search by applicant name, email, or status"
      />
      <button class="btn-secondary" id="applicationSearchBtn">Search</button>
    </section>

    <section id="jobApplicationsContainer" class="list-stack">
      <p>Loading applications...</p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/recruiter-job-applications.js"></script>
</body>
</html>
