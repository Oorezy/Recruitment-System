<!DOCTYPE html>
<html lang="en">
<head>
  <title>Edit Job - Recruitment System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>Recruitment System</h1>
    </div>

    <nav class="topbar-right">
      <a href="recruiter-dashboard.html" class="nav-link">Dashboard</a>
      <a href="recruiter-jobs.html" class="nav-link active">Manage Jobs</a>
      <a href="#" class="nav-link" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="page-header">
      <div>
        <h2>Edit Job</h2>
        <p>Update an existing job posting.</p>
      </div>
    </section>

    <section class="form-card">
      <form id="editJobForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="editTitle">Job Title</label>
            <input type="text" id="editTitle" required />
          </div>

          <div class="form-group">
            <label for="editDepartment">Department</label>
            <input type="text" id="editDepartment" required />
          </div>

          <div class="form-group">
            <label for="editLocation">Location</label>
            <input type="text" id="editLocation" required />
          </div>

          <div class="form-group">
            <label for="editJobType">Job Type</label>
            <select id="editJobType" required>
              <option value="">Select job type</option>
              <option value="Full-time">Full-time</option>
              <option value="Part-time">Part-time</option>
              <option value="Contract">Contract</option>
              <option value="Hybrid">Hybrid</option>
              <option value="Remote">Remote</option>
            </select>
          </div>

          <div class="form-group">
            <label for="editDeadline">Application Deadline</label>
            <input type="date" id="editDeadline" required />
          </div>

          <div class="form-group">
            <label for="editStatus">Status</label>
            <select id="editStatus" required>
              <option value="Open">Open</option>
              <option value="Closed">Closed</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="editDescription">Description</label>
          <textarea id="editDescription" rows="5" required></textarea>
        </div>

        <div class="form-group">
          <label for="editSkills">Required Skills</label>
          <input type="text" id="editSkills" placeholder="e.g. JavaScript, HTML, CSS" />
        </div>

        <div class="form-group">
          <label for="editResponsibilities">Responsibilities</label>
          <textarea id="editResponsibilities" rows="4" placeholder="One per line"></textarea>
        </div>

        <div class="form-group">
          <label for="editQualifications">Qualifications</label>
          <textarea id="editQualifications" rows="4" placeholder="One per line"></textarea>
        </div>

        <div class="action-row">
          <button type="submit" class="btn-primary btn-inline">Save Changes</button>
          <a href="recruiter-jobs.html" class="btn-secondary btn-inline text-no-underline">Cancel</a>
        </div>

        <p id="editJobMessage" class="message"></p>
      </form>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/edit-job.js"></script>
</body>
</html>
