<!DOCTYPE html>
<html lang="en">
<head>
  <title>Applicant Dashboard - Recruitment System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>Recruitment System</h1>
    </div>

    <nav class="topbar-right">
      <a href="#" class="nav-link">Jobs</a>
      <a href="#" class="nav-link active">Dashboard</a>
      <a href="#" class="nav-link" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="page-header">
      <div>
        <h2 id="welcomeTitle">Applicant Dashboard</h2>
        <p>Track your applications and profile progress.</p>
      </div>
    </section>

    <section class="stats-grid">
      <div class="stat-card">
        <p class="stat-label">Total Applications</p>
        <h3 id="totalApplications">0</h3>
      </div>

      <div class="stat-card">
        <p class="stat-label">Under Review</p>
        <h3 id="underReviewCount">0</h3>
      </div>

      <div class="stat-card">
        <p class="stat-label">Shortlisted</p>
        <h3 id="shortlistedCount">0</h3>
      </div>

      <div class="stat-card">
        <p class="stat-label">Interviews</p>
        <h3 id="interviewCount">0</h3>
      </div>
    </section>

    <section class="dashboard-grid">
      <div class="dashboard-card">
        <div class="section-header">
          <h3>My Profile</h3>
        </div>

        <div id="profileSummary">
          <p>Summary from API</p>
        </div>
      </div>

      <div class="dashboard-card">
        <div class="section-header">
          <h3>Recent Applications</h3>
          <a href="#" class="text-link">View all</a>
        </div>

        <div id="recentApplications">
          <p>Applications from API</p>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
